            <h1>超越強者之巔</h1>
            <div class="k-quotes"><blockquote>群蜂隊的編輯者奎茵提到，湧油山谷裡歷戰魔物的目擊驟減，十分不自然。獵人接手代其執行調查任務，根據奎茵的報告，從湧油山谷的中層與上層開始調查。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/qiang-zou-yao.html">強走藥</a> x3</td><td>飲用此藥後，會於一定時間內減少行動所需的耐力消耗量，更會增加耐力上限。</td></tr><tr><td><a href="../../database/items/gui-ren-yao-da.html">鬼人藥・大</a> x3</td><td>於一段時間內提升攻擊力的藥。據說是效果更勝鬼人藥的夢幻藥品。</td></tr><tr><td><a href="../../database/items/gui-ren-fen-chen.html">鬼人粉塵</a> x10</td><td>撒向四周就能暫時提高周圍對象攻擊力的粉塵。</td></tr></tbody></table></div></section>
