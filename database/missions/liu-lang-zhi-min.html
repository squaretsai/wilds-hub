            <h1>流浪之民</h1>
            <div class="k-quotes"><blockquote>阿茲茲居民帶領拿塔來到了像是通往地下的道路，拿塔感到十分眼熟。穿過通道應該就能到達守護者村莊。一想到終於可以回家，他的內心不禁激動起來。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/bing-guang-jin-shu.html">冰光金屬</a> x3</td><td>可在冰霧斷崖採掘到的礦石。由寒氣包覆，在光線下會反射純白的光輝。</td></tr><tr><td><a href="../../database/items/jie-dong-bing-gu.html">結凍冰骨</a> x3</td><td>可在冰霧斷崖的骨塚採集到的骨素材。在封閉的凍結之地長年淬鍊而成。</td></tr><tr><td><a href="../../database/items/kai-yu.html">鎧玉</a> x10</td><td>蒸鍍在裝備上提高強度的素材。可些微強化防具。</td></tr></tbody></table></div></section>
