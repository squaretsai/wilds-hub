            <div class="k-quotes"><blockquote>在冰霧斷崖差點害柳浪受傷的應該是怪鳥。那隻怪鳥離開了原本的棲息地，變得十分凶暴。看來有必要加以調查，把牠找出來。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/lao-jiu-long-diao-bi.html">老舊龍雕幣</a> x5</td><td>在東部地區發現的特產品。硬幣上刻有細緻的浮雕，據說是古代曾經使用的貨幣……</td></tr><tr><td><a href="../../database/items/xue-guang-jin-shu.html">雪光金屬</a> x2</td><td>可在冰霧斷崖採掘到的礦石。由強烈的寒氣包覆，在光線下會反射藍白色光輝。</td></tr></tbody></table></div></section>
