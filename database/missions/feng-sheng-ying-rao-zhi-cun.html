            <h1>風聲縈繞之村</h1>
            <div class="k-quotes"><blockquote>拿塔走過的地下道已經崩塌，如果想要前往守護者村莊，就只能從地面走去。調查隊在大本營整裝時，獵人和阿爾瑪騎著鷺鷹龍，護送伊賽與諾諾回到他們的村落，然而……</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/ku-na-fa-qi-si.html">庫納法起司</a></td><td>營火料理的追加食材。是庫納法村民精心製作的起司，加熱後的延展性非常驚人。</td></tr><tr><td><a href="../../database/items/ku-chong-zhi.html">苦蟲汁</a> x5</td><td>蘊含可促進自然治癒力的苦蟲精華，可用於調合各種藥物。</td></tr><tr><td><a href="../../database/items/da-di-jie-jing.html">大地結晶</a> x3</td><td>微生物的遺骸和腐壞物結晶後產生的石頭，可從礦脈採掘到。可用作裝備的研磨材料，在工房頗受重視。</td></tr></tbody></table></div></section>
