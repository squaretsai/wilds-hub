            <h1>赤誠所向</h1>
            <div class="k-quotes"><blockquote>扎托說到湧油之地有個傳承著古老工藝的村落。村裡的三個氏族究竟過著什麼樣的生活呢？飛鳥隊與星辰隊一同前往該村落，期待能打聽到守護者的情報。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/you-ni-xia.html">油泥蝦</a></td><td>營火料理的追加食材。這種蝦棲息在湧油山谷水域，是阿茲茲村民的營養來源之一。</td></tr><tr><td><a href="../../database/items/hui-long-shi.html">輝龍石</a> x5</td><td>可從礦脈採掘到的礦石。相當稀有，是製作堅硬裝備時不可或缺的材料。</td></tr><tr><td><a href="../../database/items/kai-yu.html">鎧玉</a> x5</td><td>蒸鍍在裝備上提高強度的素材。可些微強化防具。</td></tr></tbody></table></div></section>
