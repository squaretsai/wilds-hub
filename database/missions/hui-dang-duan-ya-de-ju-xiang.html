            <h1>迴盪斷崖的巨響</h1>
            <div class="k-quotes"><blockquote>根據阿帕爾的情報指出，冰霧斷崖有魔物在四處肆虐，令其他魔物為了遠離危險而來到蘇加附近。前往冰霧斷崖，狩獵引發事態的風鋏龍和雪獅子王吧。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/mian-mian-dan.html">綿綿蛋</a> x3</td><td>營火料理的追加食材。品質比柔柔蛋更佳，吃一口能令人彷彿置身天國。</td></tr><tr><td><a href="../../database/items/gu-lao-mi-yao.html">古老秘藥</a> x5</td><td>提升體力和耐力上限到最大，並完全回復體力和耐力的藥。體力上限會在一段時間後恢復原狀。</td></tr></tbody></table></div></section>
