            <h1>獵人的尊嚴</h1>
            <div class="k-quotes"><blockquote>獵人調查森林後，得知闢獸不再怕人，而且已經成群結隊，有頭領帶頭，想必遲早會衝進庫納法村。飛鳥隊立刻前往庫納法村，警告村民。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/ku-na-fa-qi-si.html">庫納法起司</a> x3</td><td>營火料理的追加食材。是庫納法村民精心製作的起司，加熱後的延展性非常驚人。</td></tr><tr><td><a href="../../database/items/bao-zha-gu.html">爆炸菇</a> x5</td><td>蘊含高溫的稀有蘑菇。是調合爆彈所需爆藥的所需素材。</td></tr><tr><td><a href="../../database/items/yan-que-shi.html">燕雀石</a> x3</td><td>可從礦脈採掘到的礦石。可精煉成比鐵礦石更優質的燕雀鋼。</td></tr></tbody></table></div></section>
