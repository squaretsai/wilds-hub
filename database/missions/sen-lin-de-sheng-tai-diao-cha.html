            <h1>森林的生態調查</h1>
            <div class="k-quotes"><blockquote>飛鳥隊前往了庫納法村。雖然沒有打聽到守護者一族的消息，但是族長提到大型魔物闢獸正在靠近人類的生活區域。獵人感到事態異常，決定前往森林調查闢獸的生態。</blockquote></div><section class="k-section"><div class="table-wrap"><table class="k-table wide"><tbody><tr><td><a href="../../database/items/chui-xian-mo-gu.html">垂涎蘑菇</a> x3</td><td>營火料理的追加食材。只有莫利巴才知道這種蘑菇生長的秘密場所。</td></tr><tr><td><a href="../../database/items/sheng-ming-fen-chen.html">生命粉塵</a> x5</td><td>撒向四周就能回復體力的粉塵。</td></tr><tr><td><a href="../../database/items/ying-zhi-gu-tou.html">硬質骨頭</a> x3</td><td>可在骨塚採集到的堅硬骨素材。硬度雖高，卻不會太重，是相當好用的素材。</td></tr></tbody></table></div></section>
